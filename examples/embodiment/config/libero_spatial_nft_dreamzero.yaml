# libero_spatial_nft_dreamzero_5b_lora.yaml
# DreamZero 5B + LoRA + NFT RL on Libero Spatial
# Locked NFT setting: nft_tau=1.0 (on-policy) + target_space=x0 + xcur_source=resample

defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/dreamzero@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    rollout,env: 0
    actor: 1

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_spatial_nft_dreamzero_5b_lora"
    logger_backends: ["tensorboard"]

  max_epochs: 100
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: -1
  resume_dir: null
  ckpt_path: null

algorithm:
  group_size: 8
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level

  update_epoch: 1
  adv_type: grpo
  loss_type: embodied_nft
  filter_rewards: True
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  # NFT-specific (locked to on-policy + x0 + resample)
  nft_loss_form: mse               # dpo | mse
  nft_beta: 1.0
  adv_clip_max: 0.5
  dpo_beta: 1.0
  max_drift: 0.3
  nft_weight_mode: auto
  nft_weight_scale: [1.0, 0.2]
  nft_target_space: x0             # locked
  nft_xcur_source: resample        # locked (forces recompute_v=True inside worker)
  nft_tau: 1.0                     # locked: on-policy, no shadow state_dict
  recompute_v: True
  nft_sum_type: action_level

  # required by rollout worker
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 8
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    group_size: ${algorithm.group_size}
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/train
  eval:
    total_num_envs: 8
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}
    # LoRA must be symmetric between actor and rollout so peft-wrapped
    # parameter keys line up during sync_model_to_rollout.
    use_lora: ${actor.model.use_lora}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 8
  seed: 42
  enable_offload: False

  model:
    model_type: "dreamzero"
    model_path: /mnt/project_rlinf/chenkang/RLinf_codes/RLinf_dreamzero_new/.vscode/checkpoints/checkpoint-6000

    action_dim: 7
    num_action_chunks: 16
    embodiment_tag: "libero_sim"

    use_lora: True                 # toggle LoRA injection in get_model
    use_fake_model: False          # True → keep DreamZeroPolicy, use fake backbone/action_head

    tokenizer_path: /mnt/project_rlinf_hs/yuanhuining/models/umt5-xxl
    max_seq_len: 512
    add_value_head: False
    precision: bf16

  optim:
    lr: 5.0e-5                     # LoRA-friendly lr
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.0              # LoRA: skip weight decay on adapters
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
