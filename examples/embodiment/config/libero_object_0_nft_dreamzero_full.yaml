# DreamZero 5B + LoRA + NFT RL on LIBERO Object task 0.
#
# This is the non-debug counterpart of libero_object_0_nft_dreamzero_debug.yaml.
# It follows the OpenPI NFT hyper-parameter style where it applies, while keeping
# DreamZero-specific runtime constraints:
#   - 9 input frames = one DreamZero context chunk.
#   - 16 actions = one action chunk.
#   - actor and rollout/env are split 4+4 across 8 GPUs to reduce peak memory.
#   - initial full weight sync is skipped because DreamZero FSDP full_tensor sync
#     OOMs in the current implementation.

defaults:
  - env/libero_object@env.train
  - env/libero_object@env.eval
  - model/dreamzero@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    rollout,env: 0-3
    actor: 4-7

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_object_0_nft_dreamzero_full"
    logger_backends: ["tensorboard"]

  max_epochs: 100
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: -1
  resume_dir: null
  ckpt_path: null

  # Current DreamZero full model sync materializes large FSDP tensors and can OOM.
  # For true long training, replace this with a LoRA/patch-only syncer.
  skip_initial_weight_sync: True
  weight_sync_interval: 1

algorithm:
  group_size: 8
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level

  update_epoch: 2
  adv_type: grpo
  loss_type: embodied_nft
  filter_rewards: True
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  # NFT-specific params, matched to the OpenPI NFT config where meaningful.
  nft_loss_form: mse
  nft_beta: 1.0
  adv_clip_max: 0.5
  dpo_beta: 1.0
  max_drift: 0.3
  nft_weight_mode: "auto"
  nft_weight_scale: [1.0, 0.2]
  nft_target_space: "x0"
  nft_xcur_source: "resample"
  nft_tau: 1.0
  # With nft_xcur_source=resample, fsdp_nft_policy_worker recomputes v_old
  # regardless of this flag. Keeping False matches the OpenPI YAML semantics.
  recompute_v: False
  nft_sum_type: action_level

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    task_id_filter: [0]
    total_num_envs: 32
    group_size: ${algorithm.group_size}
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/train
  eval:
    task_id_filter: [0]
    total_num_envs: 64
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}
    use_lora: ${actor.model.use_lora}
    action_dim: ${actor.model.action_dim}
    num_action_chunks: ${actor.model.num_action_chunks}
    embodiment_tag: ${actor.model.embodiment_tag}
    tokenizer_path: ${actor.model.tokenizer_path}
    num_steps: ${actor.model.num_steps}
    context_num_frames: ${actor.model.context_num_frames}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 32
  seed: 42
  enable_offload: False

  model:
    model_type: "dreamzero"
    model_path: /mnt/project_rlinf/chenkang/RLinf_codes/RLinf_dreamzero_new/.vscode/checkpoints/checkpoint-6000

    action_dim: 7
    num_action_chunks: 16
    num_steps: 4
    context_num_frames: 9
    embodiment_tag: "libero_sim"
    is_lora: false
    use_lora: True

    tokenizer_path: /mnt/project_rlinf_hs/yuanhuining/models/umt5-xxl
    max_seq_len: 512
    add_value_head: False
    precision: bf16

  optim:
    lr: 5.0e-5
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.0
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp2"
    sharding_strategy: "full_shard"
    use_orig_params: True
    gradient_checkpointing: True
    limit_all_gathers: True
    reshard_after_forward: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
